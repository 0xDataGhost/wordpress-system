<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة تحكم المتجر</title>
    <meta
      name="description"
      content="لوحة تحكم لإدارة متاجر ووكومرس: المنتجات، الطلبات، العملاء والمبيعات."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          var isDark =
            stored === "dark" ||
            ((stored === "system" || !stored) && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
